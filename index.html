<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JST (BPS-14) Full Mock Test</title>
    <style>
        :root { --primary: #2c3e50; --secondary: #3498db; --success: #27ae60; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: #333; margin: 0; padding: 20px; }
        .quiz-container { max-width: 850px; margin: auto; background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--primary); font-size: 1.5rem; margin-bottom: 30px; border-bottom: 2px solid var(--secondary); padding-bottom: 10px; }
        .question-block { display: none; }
        .question-block.active { display: block; }
        .q-text { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; color: var(--primary); }
        .options { list-style: none; padding: 0; }
        .options li { background: #fff; border: 2px solid #eee; border-radius: 8px; padding: 12px 15px; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
        .options li:hover { border-color: var(--secondary); background: #f0f8ff; }
        .options li.selected { border-color: var(--secondary); background: var(--secondary); color: white; }
        .controls { display: flex; justify-content: space-between; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        button { padding: 12px 25px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; transition: opacity 0.3s; }
        .btn-prev { background: #95a5a6; color: white; }
        .btn-next { background: var(--secondary); color: white; }
        .btn-submit { background: var(--success); color: white; display: none; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #result-screen { text-align: center; display: none; }
        .score-circle { width: 150px; height: 150px; border-radius: 50%; border: 8px solid var(--success); display: flex; align-items: center; justify-content: center; margin: 20px auto; font-size: 2rem; font-weight: bold; color: var(--success); }
        .progress-bar { font-size: 0.9rem; color: #7f8c8d; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>Junior Science Teacher (BPS-14) Test</h1>
    <div id="quiz-box">
        <div class="progress-bar" id="progress">Question 1 of 100</div>
        <div id="questions-container"></div>
    </div>

    <div class="controls" id="nav-controls">
        <button class="btn-prev" id="prevBtn" onclick="move(-1)" disabled>Previous</button>
        <button class="btn-next" id="nextBtn" onclick="move(1)">Next</button>
        <button class="btn-submit" id="submitBtn" onclick="calcScore()">Submit Test</button>
    </div>

    <div id="result-screen">
        <h2>Test Completed!</h2>
        <p>Your Final Score:</p>
        <div class="score-circle" id="final-score">0/100</div>
        <button style="background: var(--primary); color: white;" onclick="location.reload()">Restart Test</button>
    </div>
</div>

let currentQ = 0;
let answers = {};

function init() {
    const container = document.getElementById('questions-container');
    quizData.forEach((item, idx) => {
        const div = document.createElement('div');
        div.className = `question-block ${idx === 0 ? 'active' : ''}`;
        div.innerHTML = `<div class="q-text">${idx+1}. ${item.q}</div>
            <ul class="options">
                ${Object.entries(item.options).map(([key, val]) => 
                    `<li onclick="pick(${idx}, '${key}', this)">${key}) ${val}</li>`
                ).join('')}
            </ul>`;
        container.appendChild(div);
    });
}

function pick(qIdx, choice, el) {
    answers[qIdx] = choice;
    const parent = el.parentElement;
    Array.from(parent.children).forEach(li => li.classList.remove('selected'));
    el.classList.add('selected');
}

function move(dir) {
    const questions = document.querySelectorAll('.question-block');
    questions[currentQ].classList.remove('active');
    currentQ += dir;
    questions[currentQ].classList.add('active');
    
    document.getElementById('prevBtn').disabled = currentQ === 0;
    document.getElementById('nextBtn').style.display = currentQ === quizData.length - 1 ? 'none' : 'block';
    document.getElementById('submitBtn').style.display = currentQ === quizData.length - 1 ? 'block' : 'none';
    document.getElementById('progress').innerText = `Question ${currentQ + 1} of 100`;
}

function calcScore() {
    let score = 0;
    quizData.forEach((item, idx) => {
        if(answers[idx] === item.a) score++;
    });
    document.getElementById('quiz-box').style.display = 'none';
    document.getElementById('nav-controls').style.display = 'none';
    document.getElementById('result-screen').style.display = 'block';
    document.getElementById('final-score').innerText = `${score}/100`;
}

init();
